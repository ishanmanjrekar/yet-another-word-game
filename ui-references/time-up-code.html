<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Lilita+One&amp;family=Be+Vietnam+Pro:wght@400;500;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-container-high": "#28283d",
              "on-primary-container": "#d6b400",
              "inverse-on-surface": "#2f2e43",
              "secondary": "#dfb7ff",
              "on-tertiary": "#003917",
              "on-primary-fixed-variant": "#544600",
              "tertiary-fixed": "#63ff93",
              "surface-container-highest": "#333348",
              "secondary-fixed": "#f1daff",
              "primary-fixed-dim": "#e9c400",
              "on-background": "#e2e0fc",
              "tertiary-container": "#005325",
              "on-secondary-container": "#d5a4ff",
              "surface": "#111125",
              "surface-variant": "#333348",
              "outline-variant": "#4d4353",
              "on-primary-fixed": "#221b00",
              "surface-dim": "#111125",
              "secondary-container": "#6c11af",
              "surface-container-low": "#1a1a2e",
              "on-error": "#690005",
              "surface-bright": "#37374d",
              "inverse-primary": "#705d00",
              "on-error-container": "#ffdad6",
              "outline": "#988d9e",
              "on-surface-variant": "#cfc2d5",
              "on-surface": "#e2e0fc",
              "surface-container": "#1e1e32",
              "on-secondary-fixed": "#2d004f",
              "tertiary": "#00e471",
              "surface-tint": "#e9c400",
              "on-secondary-fixed-variant": "#690bac",
              "on-tertiary-container": "#00d167",
              "primary-fixed": "#ffe16d",
              "on-tertiary-fixed": "#00210b",
              "primary-container": "#554600",
              "on-tertiary-fixed-variant": "#005224",
              "on-secondary": "#4b007e",
              "secondary-fixed-dim": "#dfb7ff",
              "surface-container-lowest": "#0c0c1f",
              "tertiary-fixed-dim": "#00e471",
              "inverse-surface": "#e2e0fc",
              "background": "#111125",
              "primary": "#e9c400",
              "error": "#ffb4ab",
              "on-primary": "#3a3000",
              "error-container": "#93000a"
            },
            fontFamily: {
              "headline": ["Lilita One"],
              "body": ["Be Vietnam Pro"],
              "label": ["Be Vietnam Pro"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .chunky-button {
            transition: transform 0.1s;
        }
        .chunky-button:active {
            transform: translateY(2px);
        }
        .glow-text {
            text-shadow: 0 0 15px rgba(233, 196, 0, 0.4);
        }
        .lilita { font-family: 'Lilita One', cursive; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-surface text-on-surface font-body overflow-hidden">
<!-- TopAppBar -->
<header class="bg-[#111125] flex items-center w-full px-6 py-4 fixed top-0 left-0 z-50 justify-end">
<div class="flex items-center gap-1 bg-surface-container-high px-3 py-1 rounded-full border-b-2 border-surface-container-highest">
<span class="material-symbols-outlined text-[#e9c400] text-sm" data-icon="monetization_on" style="font-variation-settings: 'FILL' 1;">monetization_on</span>
<span class="font-black text-[#e9c400] text-sm">1,250</span>
</div>
</header>
<main class="min-h-screen flex flex-col items-center justify-center px-6 pt-16 pb-24 gap-12 relative overflow-hidden">
<!-- Background Decor (Tactile Maximalism) -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[140%] h-[140%] bg-[radial-gradient(circle_at_center,_rgba(108,17,175,0.15)_0%,_transparent_70%)] pointer-events-none"></div>
<!-- Center Area -->
<div class="flex flex-col items-center gap-2 text-center z-10">
<div class="relative">
<span class="absolute -top-12 -left-8 text-6xl opacity-10 rotate-12 material-symbols-outlined" data-icon="schedule">schedule</span>
<h2 class="text-7xl md:text-8xl lilita text-primary glow-text leading-none tracking-tight">TIME'S UP!</h2>
<span class="absolute -bottom-8 -right-8 text-6xl opacity-10 -rotate-12 material-symbols-outlined" data-icon="hourglass_empty">hourglass_empty</span>
</div>
<p class="text-xl font-bold tracking-widest text-secondary mt-4 bg-secondary/10 px-4 py-1 rounded-lg">STAGE 12</p>
<!-- Word Progress Indicators -->
<div class="flex gap-4 mt-12 bg-surface-container-lowest p-6 rounded-3xl shadow-inner">
<!-- Solved 1 -->
<div class="w-10 h-10 rounded-full bg-tertiary flex items-center justify-center shadow-[0_4px_0_0_rgba(0,83,37,1)]">
<span class="material-symbols-outlined text-on-tertiary font-bold" data-icon="check">check</span>
</div>
<!-- Solved 2 -->
<div class="w-10 h-10 rounded-full bg-tertiary flex items-center justify-center shadow-[0_4px_0_0_rgba(0,83,37,1)]">
<span class="material-symbols-outlined text-on-tertiary font-bold" data-icon="check">check</span>
</div>
<!-- Solved 3 -->
<div class="w-10 h-10 rounded-full bg-tertiary flex items-center justify-center shadow-[0_4px_0_0_rgba(0,83,37,1)]">
<span class="material-symbols-outlined text-on-tertiary font-bold" data-icon="check">check</span>
</div>
<!-- Failed/Active 4 -->
<div class="w-10 h-10 rounded-full border-4 border-primary bg-surface-container flex items-center justify-center relative">
<div class="absolute w-2 h-2 bg-primary rounded-full animate-pulse"></div>
</div>
<!-- Unsolved 5 -->
<div class="w-10 h-10 rounded-full bg-secondary-container/30 flex items-center justify-center">
<div class="w-2 h-2 bg-secondary/20 rounded-full"></div>
</div>
</div>
</div>
<!-- Action Area -->
<div class="w-full max-w-sm flex flex-col gap-6 z-10">
<!-- Primary CTA -->
<div class="flex flex-col items-center gap-3">
<button class="chunky-button group w-full bg-primary text-on-primary py-5 rounded-2xl flex flex-col items-center justify-center shadow-[0_6px_0_0_#554600] active:shadow-[0_2px_0_0_#554600] active:translate-y-1 transition-all">
<span class="lilita text-3xl tracking-wide">+30 SECONDS</span>
<div class="flex items-center gap-1.5 opacity-90"><span class="material-symbols-outlined text-xl" data-icon="monetization_on" style="font-variation-settings: 'FILL' 1;">monetization_on</span><span class="font-black text-xl tracking-tighter">100</span></div>
</button>
<p class="text-[10px] uppercase font-bold text-outline tracking-[0.2em] opacity-60">GET EXTRA TIME TO CONTINUE YOUR GAME</p>
</div>
<!-- Secondary CTA -->
<button class="w-full py-4 rounded-2xl flex items-center justify-center gap-2 group transition-all hover:bg-surface-container-high">
<span class="material-symbols-outlined text-secondary group-hover:-translate-x-1 transition-transform" data-icon="home">home</span>
<span class="lilita text-xl text-secondary tracking-widest">HOME</span>
</button>
</div>
</main>
<!-- BottomNavBar (Suppressed as it is a transactional failure screen) -->
<!-- The "Relevance Check" logic from the hierarchy applies here. Transactional/Fail screens suppress global nav -->
</body></html>
