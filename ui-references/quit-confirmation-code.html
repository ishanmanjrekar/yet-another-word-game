                        "surface-dim": "#111125",

                        "surface-container-lowest": "#0c0c1f",

                        "on-secondary": "#4b007e",
                        "primary": "#e9c400"

                    fontFamily: {
                        "headline": ["Epilogue"],
                        "body": ["Be Vietnam Pro"],
                        "label": ["Be Vietnam Pro"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "1.5rem", "full": "9999px"},
                },

        }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .chunky-shadow-primary {
            box-shadow: 0 4px 0 0 #554600;
        }
        .chunky-shadow-error {
            box-shadow: 0 4px 0 0 #690005;
        }
        .chunky-shadow-surface {
            box-shadow: 0 4px 0 0 #0c0c1f;
        }
        .recessed-inner {
            box-shadow: inset 0 2px 8px 0 rgba(0,0,0,0.4);
        }
        body {
            height: 100vh;
            overflow: hidden;
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body selection:bg-primary selection:text-on-primary overflow-hidden">
<div class="fixed inset-0 z-0 overflow-hidden">
<div class="absolute inset-0 bg-cover bg-center opacity-40 blur-2xl scale-110" data-alt="Blurred gameplay screen with colorful letter tiles scattered across a deep purple game board background" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuC9nlsSBwZjdaLKNssmYKYgTkVQASutC4hf8mhhMtNUX8FNcaOAAgVSJStXjtXDUd05YPp7JIQEdKzmOl8Cla8LXhTmvV1nYLl0E5FKODS_6nvTa3leVml7eoV7BqshtIAcD7C6Iw4vH-wjhpgmR587UoytpxItWSrBGaEjDeqQ4crLW_esJ3DVMdBXkA8ajtC7UPbDtPb6-VqYjiGlo11MLoxIKhv02aA-UNOLFyazi52sazRGGGVVUOm8_Dl642NnfzDvsp1suQ');">
</div>
<div class="absolute inset-0 bg-surface/60 backdrop-blur-md"></div>
</div>
<nav class="fixed top-0 w-full z-50 flex justify-between items-center px-6 h-16 w-full">
<!-- Navigation items removed as per request -->
</nav>
<main class="relative z-10 h-screen flex items-center justify-center p-6">
<div class="w-full max-w-md bg-surface-container-low rounded-xl p-8 flex flex-col items-center gap-8 relative shadow-2xl">
<div class="absolute -top-6 left-1/2 -translate-x-1/2 bg-surface-container-high px-6 py-2 rounded-full border-4 border-surface-container-low shadow-lg">
<span class="font-['Be_Vietnam_Pro'] font-bold text-xs uppercase tracking-widest text-secondary">Warning</span>
</div>
<div class="text-center space-y-4 pt-4">
<h2 class="font-['Lilita_One'] text-4xl md:text-5xl text-on-surface leading-tight tracking-tight uppercase">ARE YOU SURE?</h2>
<p class="font-['Be_Vietnam_Pro'] text-on-surface-variant text-sm max-w-[280px] mx-auto leading-relaxed">
                You will lose your current progress.
            </p>
</div>
<div class="w-full space-y-4">
<button class="w-full group relative transition-all active:translate-y-[2px]">
<div class="bg-primary text-on-primary py-5 rounded-xl flex items-center justify-center gap-3 chunky-shadow-primary transition-all group-hover:brightness-110">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
<span class="font-['Lilita_One'] text-2xl uppercase tracking-wide">CANCEL</span>
</div>
</button>
<button class="w-full group relative transition-all active:translate-y-[2px]">
<div class="bg-error-container text-on-error-container py-5 rounded-xl flex items-center justify-center gap-3 chunky-shadow-error border border-white/5 transition-all group-hover:bg-error-container/80">
<span class="material-symbols-outlined text-2xl" data-icon="exit_to_app">exit_to_app</span>
<span class="font-['Lilita_One'] text-2xl uppercase tracking-wide">YES, QUIT</span>
</div>
</button>
</div>
</div>
</main>
<div class="fixed inset-0 pointer-events-none border-[16px] border-surface-container-lowest/20 z-40"></div>
</body></html>
